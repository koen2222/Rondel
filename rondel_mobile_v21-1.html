<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Rondel</title><!-- v21: status-fx + particles -->
<meta name="theme-color" content="#0a0806">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=EB+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root { --bg: #050403; --ink: #f4ecd8; --p1: #3b82f6; --p1-glow: rgba(59, 130, 246, 0.6); --p2: #ef4444; --p2-glow: rgba(239, 68, 68, 0.6); --gold: #f59e0b; --gold-glow: rgba(245, 158, 11, 0.6); }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); font-family: 'EB Garamond', Georgia, serif; overscroll-behavior: none; user-select: none; min-height: 100vh; }
  .game { max-width: 500px; margin: 0 auto; padding: 12px 6px; display: flex; flex-direction: column; gap: 10px; }
  
  .turn-banner { padding: 12px 16px; border-radius: 12px; background: linear-gradient(90deg, #1f1814, #0a0806); border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 4px 15px rgba(0,0,0,0.5); font-family: 'Cinzel', serif; font-size: 0.95rem; letter-spacing: 0.08em; display: flex; justify-content: space-between; align-items: center; transition: all 0.3s ease; }
  .turn-banner.p1 { border-left: 4px solid var(--p1); box-shadow: 0 0 15px var(--p1-glow); }
  .turn-banner.p2 { border-left: 4px solid var(--p2); box-shadow: 0 0 15px var(--p2-glow); }

  .bench { display: flex; gap: 8px; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 12px; min-height: 70px; overflow-x: auto; border: 1px solid rgba(255,255,255,0.05); }
  .bench.dim { opacity: 0.3; pointer-events: none; }
  .bench-card { flex: 0 0 auto; width: 60px; height: 70px; background: linear-gradient(160deg, #241c33, #110d1d); border: 1px solid rgba(125,211,252,0.12); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; transition: transform 0.2s, box-shadow 0.2s; overflow: hidden; }
  .bench-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 45%; background: linear-gradient(180deg, rgba(255,255,255,0.07), transparent); pointer-events: none; }
  .bench-card .sokkel { width: 36px; height: 10px; border-radius: 50%; margin-top: -8px; }
  .bench-card.p1 .sokkel { background: radial-gradient(ellipse at 35% 30%, #60a5fa, #1d4ed8 60%, #172554); box-shadow: 0 2px 3px rgba(0,0,0,0.7); }
  .bench-card.p2 .sokkel { background: radial-gradient(ellipse at 35% 30%, #f87171, #b91c1c 60%, #450a0a); box-shadow: 0 2px 3px rgba(0,0,0,0.7); }
  .bench-card.p1 { border-bottom: 3px solid var(--p1); } .bench-card.p2 { border-bottom: 3px solid var(--p2); }
  .bench-card.selected { transform: translateY(-4px); box-shadow: 0 8px 20px var(--gold-glow); border-color: var(--gold); }
  .bench-card svg { width: 42px; height: 42px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.8)); }
  .bench-card .name { font-size: 0.55rem; margin-top: 4px; color: #a89f91; font-family: 'Cinzel', serif; }
  .mp-badge { position: absolute; top: -4px; left: -4px; background: linear-gradient(135deg, #fbbf24, #d97706); color: #000; font-family: 'Cinzel', serif; font-weight: 900; font-size: 0.65rem; width: 18px; height: 18px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); border: 1px solid #fff; }

  .board-wrap { position: relative; background: radial-gradient(ellipse at 50% 38%, #1b1530 0%, #0d0a18 55%, #050409 100%); border-radius: 16px; padding: 0; border: 1px solid rgba(125,211,252,0.12); box-shadow: inset 0 0 70px rgba(0,0,0,0.85), 0 10px 30px rgba(0,0,0,0.9); overflow: hidden; }
  /* Holografische ringen, heel subtiel — Duel-sfeer */
  .board-wrap::before { content: ''; position: absolute; inset: 0; background: repeating-radial-gradient(circle at 50% 50%, rgba(125,211,252,0.035) 0 1px, transparent 1px 64px); pointer-events: none; }
  .board-wrap::after { content: ''; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 45%, rgba(125,211,252,0.04) 100%); pointer-events: none; mix-blend-mode: overlay; }
  
  #board { display: block; width: 100%; height: auto; filter: drop-shadow(0 15px 15px rgba(0,0,0,0.6)); }
  
  .route-halo { stroke: rgba(125,211,252,0.14); stroke-width: 9; stroke-linecap: round; fill: none; }
  .route-core { stroke: rgba(214,233,255,0.5); stroke-width: 2; stroke-linecap: round; fill: none; }
  
  .node-rim { stroke: rgba(255,255,255,0.28); stroke-width: 1.5; }
  .entry-ring.p1 { stroke: var(--p1); stroke-width: 3.5; filter: drop-shadow(0 0 10px var(--p1-glow)); }
  .entry-ring.p2 { stroke: var(--p2); stroke-width: 3.5; filter: drop-shadow(0 0 10px var(--p2-glow)); }
  .goal-halo { fill: none; stroke-width: 2; animation: goalPulse 2.4s ease-in-out infinite; }
  .goal-halo.p1 { stroke: var(--p1); filter: drop-shadow(0 0 8px var(--p1-glow)); }
  .goal-halo.p2 { stroke: var(--gold); filter: drop-shadow(0 0 8px var(--gold-glow)); }
  @keyframes goalPulse { 0%, 100% { opacity: 0.25; } 50% { opacity: 0.85; } }
  @media (prefers-reduced-motion: reduce) { .goal-halo { animation: none; opacity: 0.6; } }
  
  .node-glow { fill: rgba(245, 158, 11, 0.25); stroke: var(--gold); stroke-width: 2; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .node-glow.active { opacity: 1; filter: drop-shadow(0 0 8px var(--gold)); }
  
  .unit-fig { cursor: pointer; }
  .unit-fig.selected .fig-base { stroke: var(--gold); stroke-width: 3; filter: drop-shadow(0 0 12px var(--gold)); }

  .action-bar { display: flex; gap: 10px; padding: 8px 0; }
  .btn { flex: 1; padding: 12px; background: linear-gradient(180deg, #2a201a, #14100d); color: var(--ink); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; font-family: 'Cinzel', serif; font-size: 0.85rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.4); }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 2px rgba(0,0,0,0.6); }
  .btn.primary { background: linear-gradient(180deg, #fbbf24, #b45309); color: #000; border: none; box-shadow: 0 4px 15px var(--gold-glow); }

  .overlay { position: fixed; inset: 0; background: rgba(5, 4, 3, 0.95); backdrop-filter: blur(10px); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100; padding: 20px; }
  .overlay.active { display: flex; }
  .combat-vs { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.5rem; letter-spacing: 0.3em; margin-bottom: 20px; text-shadow: 0 0 15px var(--gold-glow); }
  .disks-row { display: flex; flex-direction: column; gap: 20px; align-items: center; width: 100%; }
  .disk-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .disk-cell .who { font-family: 'Cinzel', serif; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; }
  .disk-wrap { position: relative; width: 220px; height: 220px; filter: drop-shadow(0 15px 25px rgba(0,0,0,0.8)); }
  .disk-pointer { position: absolute; top: -6px; left: 50%; transform: translateX(-50%); width: 18px; height: 26px; background: linear-gradient(180deg, #ef4444, #991b1b); border: 2px solid #fff; clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%); z-index: 5; box-shadow: 0 0 10px rgba(255,0,0,0.8); }
  .disk-svg { width: 100%; height: 100%; transition: transform 3s cubic-bezier(0.2, 0.8, 0.1, 1); }
  .combat-result { margin-top: 24px; font-family: 'Cinzel', serif; font-size: 1.1rem; text-align: center; min-height: 50px; line-height: 1.5; }
  .combat-result .ko { color: var(--p2-soft); font-weight: 900; font-size: 1.3rem; text-shadow: 0 0 10px rgba(239,68,68,0.5); }
  .combat-result .status { color: var(--gold); font-style: italic; }

  .plate-strip { display: flex; gap: 8px; overflow-x: auto; padding: 4px 2px; }
  .plate-chip { flex: 0 0 auto; min-width: 110px; background: linear-gradient(145deg, #2a201a, #14100d); border: 1px solid rgba(245,158,11,0.3); border-radius: 8px; padding: 6px 10px; display: flex; flex-direction: column; gap: 2px; cursor: pointer; transition: transform 0.15s; }
  .plate-chip b { font-family: 'Cinzel', serif; font-size: 0.7rem; color: var(--gold); letter-spacing: 0.05em; }
  .plate-chip span { font-size: 0.6rem; color: #a89f91; }
  .plate-chip.selected { border-color: var(--gold); box-shadow: 0 0 12px var(--gold-glow); transform: translateY(-2px); }
  .plate-chip.disabled { opacity: 0.35; pointer-events: none; }

  .deck-panel { background: linear-gradient(180deg, #1a130e, #0a0806); border: 1px solid rgba(245,158,11,0.3); border-radius: 16px; padding: 16px; width: 100%; max-width: 460px; max-height: 90vh; overflow-y: auto; }
  .deck-title { font-family: 'Cinzel', serif; color: var(--gold); text-align: center; letter-spacing: 0.2em; margin-bottom: 10px; font-size: 1rem; text-shadow: 0 0 12px var(--gold-glow); }
  .deck-sub { font-family: 'Cinzel', serif; font-size: 0.75rem; color: #a89f91; margin: 10px 0 6px; letter-spacing: 0.08em; }
  .deck-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .deck-grid.plates { grid-template-columns: repeat(2, 1fr); }
  .deck-card { background: linear-gradient(145deg, #2a201a, #14100d); border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 6px 4px; text-align: center; cursor: pointer; }
  .deck-card svg { width: 32px; height: 30px; }
  .deck-card .name { font-family: 'Cinzel', serif; font-size: 0.6rem; color: var(--ink); margin-top: 2px; }
  .deck-card .fac { font-size: 0.55rem; color: #8a8175; }
  .deck-card.selected { border-color: var(--gold); box-shadow: 0 0 10px var(--gold-glow); }
  .deck-actions { display: flex; gap: 10px; margin-top: 14px; }
  .deck-credits { text-align: center; font-family: 'Cinzel', serif; color: var(--gold); font-size: 0.85rem; letter-spacing: 0.1em; margin-bottom: 8px; text-shadow: 0 0 10px var(--gold-glow); }
  .deck-card.locked { opacity: 0.55; }
  .deck-card.locked svg { filter: grayscale(1); }
  .deck-card .price { font-family: 'Cinzel', serif; font-size: 0.55rem; color: var(--gold); margin-top: 3px; border: 1px solid rgba(245,158,11,0.4); border-radius: 4px; padding: 1px 3px; display: inline-block; }
  .deck-card .lvl { font-size: 0.55rem; color: #a89f91; margin-top: 3px; }
  .deck-card .up { color: var(--gold); border: 1px solid rgba(245,158,11,0.4); border-radius: 4px; padding: 0 3px; margin-left: 3px; }
  .deck-card .rar { position: absolute; top: 2px; right: 4px; font-family: 'Cinzel', serif; font-size: 0.55rem; font-weight: 900; }
  .deck-card { position: relative; }
  .rar-C { color: #9ca3af; } .rar-U { color: #38bdf8; } .rar-R { color: var(--gold); }

  @keyframes fxRise { 0% { transform: translateY(0); opacity: .9; } 100% { transform: translateY(-16px); opacity: 0; } }
  @keyframes fxFlicker { 0%, 100% { opacity: .95; } 40% { opacity: .15; } 60% { opacity: .7; } }
  @keyframes fxOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  @keyframes fxBob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-2.5px); } }
  @keyframes fxPoof { 0% { transform: scale(.4); opacity: .75; } 100% { transform: scale(1.7); opacity: 0; } }
  @keyframes fxBurst { 0% { transform: scale(.3); opacity: 1; } 100% { transform: scale(2); opacity: 0; } }
  @media (prefers-reduced-motion: reduce) { .fx-anim { animation: none !important; } }

  .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(20, 15, 10, 0.95); color: var(--gold); padding: 12px 24px; border-radius: 8px; font-size: 1rem; font-family: 'Cinzel', serif; border: 1px solid var(--gold); box-shadow: 0 0 20px rgba(245,158,11,0.3); z-index: 50; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div class="game">
  <div id="turn-banner" class="turn-banner p1">
    <span><span style="opacity:0.6; font-size:0.7rem;">FASE:</span> <span id="turn-name">Speler 1</span></span>
    <span style="font-size:0.8rem; color:var(--gold);" id="turn-actions">1 ACTIE</span>
  </div>
  <div id="bench-p2" class="bench"></div>
  <div class="board-wrap"><svg id="board" viewBox="0 0 540 850" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div id="bench-p1" class="bench"></div>
  <div id="plate-strip" class="plate-strip"></div>
  <div class="action-bar">
    <button class="btn primary" id="btn-end-turn">End Turn</button>
    <button class="btn" id="btn-mode">Solo</button>
    <button class="btn" id="btn-reset">Reset</button>
  </div>
</div>
<div id="deck-overlay" class="overlay">
  <div class="deck-panel">
    <div class="deck-title">— STEL JE LEGER SAMEN —</div>
    <div id="deck-credits" class="deck-credits"></div>
    <div class="deck-sub" id="deck-count-units">Units: 0 / 6</div>
    <div class="deck-grid" id="deck-units"></div>
    <div class="deck-sub" id="deck-count-plates">Plates: 0 / 3</div>
    <div class="deck-grid plates" id="deck-plates"></div>
    <div class="deck-actions">
      <button class="btn" id="btn-deck-random">Random</button>
      <button class="btn primary" id="btn-deck-start" disabled>Start</button>
    </div>
  </div>
</div>
<div id="combat-overlay" class="overlay">
  <div class="combat-vs">— DUEL —</div>
  <div class="disks-row">
    <div class="disk-cell"><div class="who" id="combat-top-name" style="color:var(--p2-soft); text-shadow: 0 0 8px var(--p2-glow);">Tegenstander</div><div class="disk-wrap"><div class="disk-pointer"></div><svg id="disk-top" class="disk-svg" viewBox="0 0 240 240"></svg></div></div>
    <div class="disk-cell"><div class="who" id="combat-bottom-name" style="color:var(--p1-soft); text-shadow: 0 0 8px var(--p1-glow);">Jij</div><div class="disk-wrap"><div class="disk-pointer"></div><svg id="disk-bottom" class="disk-svg" viewBox="0 0 240 240"></svg></div></div>
  </div>
  <div class="combat-result" id="combat-result"></div>
  <button class="btn primary" id="btn-combat-continue" style="margin-top:20px; width:100%; max-width: 240px; display:none;">Voltooien</button>
</div>
<div id="toast" class="toast"></div>

<script>
// ==========================================
// BORD — definitieve 32-node layout (vlak, conform foto sessie 6)
// Outer ring 20 + inner rechthoek 12; spokes: 4 hoek-diagonalen
// + 1 asymmetrische goal-diagonaal per goal (180° rotatie-symmetrisch)
// ==========================================
const NODES = (function() {
  const colX = c => 60 + c * 70;
  const rowY = r => 110 + r * 170;
  const N = {};
  const add = (k, c, r, type, owner) => { N[k] = { x: colX(c), y: rowY(r), type: type || 'regular', owner }; };

  // Outer top (P2-kant)
  add('E2_TL',0,0,'entry','p2'); add('T1',1,0); add('T2',2,0); add('G2',3,0,'goal','p2'); add('T3',4,0); add('T4',5,0); add('E2_TR',6,0,'entry','p2');
  // Zijkanten
  add('L1',0,1); add('L2',0,2); add('L3',0,3);
  add('R1',6,1); add('R2',6,2); add('R3',6,3);
  // Outer bottom (P1-kant)
  add('E1_BL',0,4,'entry','p1'); add('B1',1,4); add('B2',2,4); add('G1',3,4,'goal','p1'); add('B3',4,4); add('B4',5,4); add('E1_BR',6,4,'entry','p1');
  // Inner rechthoek (5 boven, 5 onder, 1 mid per zijde)
  add('IT1',1,1); add('IT2',2,1); add('IT3',3,1); add('IT4',4,1); add('IT5',5,1);
  add('IL',1,2); add('IR',5,2);
  add('IB1',1,3); add('IB2',2,3); add('IB3',3,3); add('IB4',4,3); add('IB5',5,3);
  return N;
})();

const ROUTES = [
  // Outer ring
  ['E2_TL','T1'], ['T1','T2'], ['T2','G2'], ['G2','T3'], ['T3','T4'], ['T4','E2_TR'],
  ['E2_TR','R1'], ['R1','R2'], ['R2','R3'], ['R3','E1_BR'],
  ['E1_BR','B4'], ['B4','B3'], ['B3','G1'], ['G1','B2'], ['B2','B1'], ['B1','E1_BL'],
  ['E1_BL','L3'], ['L3','L2'], ['L2','L1'], ['L1','E2_TL'],
  // Inner rechthoek
  ['IT1','IT2'], ['IT2','IT3'], ['IT3','IT4'], ['IT4','IT5'],
  ['IT1','IL'], ['IL','IB1'], ['IT5','IR'], ['IR','IB5'],
  ['IB1','IB2'], ['IB2','IB3'], ['IB3','IB4'], ['IB4','IB5'],
  // Spokes: 4 hoek-diagonalen + asymmetrische goal-diagonalen
  // (G2↔IT3, G1↔IB1, L2↔IL, R2↔IR zijn geschrapt — sessie-3 markeringen)
  ['E2_TL','IT1'], ['E2_TR','IT5'], ['E1_BL','IB1'], ['E1_BR','IB5'],
  ['G2','IT2'],
  ['G1','IB4']
];

const ADJ = {}; for (const k of Object.keys(NODES)) ADJ[k] = new Set();
for (const [a,b] of ROUTES) { ADJ[a].add(b); ADJ[b].add(a); }

const W=(n,v)=>Array(n).fill({k:'white',v}), G=(n,v)=>Array(n).fill({k:'gold',v}), B=n=>Array(n).fill({k:'blue'}), R=n=>Array(n).fill({k:'red'}), P=(n,effect,stars)=>Array(n).fill({k:'purple',stars,effect});
const UNIT_DEFS = {
  squire:      { name:'Squire',            fac:'Knights', mp:2, slots:[...W(6,30), ...P(2,'paralysis',1), ...B(2), ...R(6)] },
  cleric:      { name:'Battle Cleric',     fac:'Knights', mp:2, slots:[...W(5,40), ...P(3,'sleep',1), ...B(3), ...R(5)] },
  commander:   { name:'Knight Commander',  fac:'Knights', mp:2, slots:[...G(3,50), ...W(5,60), ...P(3,'paralysis',2), ...B(2), ...R(3)] },
  scout:       { name:'Forest Scout',      fac:'Elves',   mp:3, slots:[...W(5,20), ...P(3,'poison',1), ...B(2), ...R(6)] },
  archer:      { name:'Elven Archer',      fac:'Elves',   mp:2, slots:[...W(6,50), ...P(2,'poison',1), ...B(4), ...R(4)] },
  weaver:      { name:'Arcane Weaver',     fac:'Elves',   mp:2, slots:[...W(2,70), ...G(4,40), ...P(4,'confusion',2), ...B(3), ...R(3)] },
  apprentice:  { name:'Stone Apprentice',  fac:'Dwarves', mp:1, slots:[...W(5,50), ...P(1,'paralysis',1), ...B(4), ...R(6)] },
  runesmith:   { name:'Runesmith',         fac:'Dwarves', mp:2, slots:[...W(5,50), ...P(4,'burn',1), ...B(3), ...R(4)] },
  warden:      { name:'Mountain Warden',   fac:'Dwarves', mp:1, slots:[...W(6,80), ...P(3,'paralysis',2), ...B(4), ...R(3)] },
  skeleton:    { name:'Restless Skeleton', fac:'Undead',  mp:2, slots:[...W(6,20), ...P(2,'confusion',1), ...B(2), ...R(6)] },
  ghoul:       { name:'Ghoul',             fac:'Undead',  mp:2, slots:[...W(5,40), ...P(4,'badlypoison',1), ...B(3), ...R(4)] },
  necromancer: { name:'Necromancer',       fac:'Undead',  mp:1, slots:[...W(2,60), ...G(4,30), ...P(4,'sleep',2), ...B(3), ...R(3)] },
  boar:        { name:'Boar Brute',        fac:'Beasts',  mp:2, slots:[...W(7,50), ...P(1,'confusion',1), ...B(2), ...R(6)] },
  lupine:      { name:'Lupine Hunter',     fac:'Beasts',  mp:3, slots:[...W(6,40), ...P(2,'paralysis',1), ...B(3), ...R(5)] },
  wyrmling:    { name:'Wyrmling',          fac:'Beasts',  mp:2, slots:[...W(5,50), ...G(3,60), ...P(4,'burn',2), ...B(2), ...R(2)] },
  imp:         { name:'Imp',               fac:'Inferno', mp:3, slots:[...W(5,20), ...P(3,'burn',1), ...B(2), ...R(6)] },
  hellhound:   { name:'Hellhound',         fac:'Inferno', mp:3, slots:[...W(6,40), ...P(3,'burn',1), ...B(3), ...R(4)] },
  pitlord:     { name:'Pit Lord',          fac:'Inferno', mp:1, slots:[...W(6,90), ...G(4,70), ...P(2,'burn',2), ...B(1), ...R(3)] }
};

const RARITY = {
  squire:'C', scout:'C', apprentice:'C', skeleton:'C', boar:'C', imp:'C',
  cleric:'U', archer:'U', runesmith:'U', ghoul:'U', lupine:'U', hellhound:'U',
  commander:'R', weaver:'R', warden:'R', necromancer:'R', wyrmling:'R', pitlord:'R'
};
const PRICE = { C:100, U:200, R:400 };
const UPGRADE_COST = { 1:150, 2:250, 3:400 }; // kosten van huidig level naar volgend (max 4)
const WIN_CREDITS = 100, LOSS_CREDITS = 25;

let profile;
function freshProfile() { return { credits: 300, owned: { squire:1, scout:1, apprentice:1, skeleton:1, boar:1, imp:1 } }; }
function loadProfile() {
  try { const raw = localStorage.getItem('rondel_profile'); profile = raw ? JSON.parse(raw) : freshProfile(); }
  catch(e) { profile = freshProfile(); }
  if (!profile || typeof profile.credits !== 'number' || !profile.owned) profile = freshProfile();
}
function saveProfile() { try { localStorage.setItem('rondel_profile', JSON.stringify(profile)); } catch(e) {} }

function unitVisual(defKey, owner, h) {
  const art = UNIT_ART[defKey];
  if (art) return `<img src="${art}" style="height:${h||46}px;width:auto;display:block;margin:0 auto;filter:drop-shadow(0 2px 3px rgba(0,0,0,0.7));">`;
  return unitSilhouette(defKey, owner);
}

let state;
let currentMode = 'solo';

function initialState() { return { turn:'p1', actionsLeft:1, units:{}, bench:{p1:[],p2:[]}, selected:null, legalTargets:new Set(), pendingDeploy:null, over:false, mode: currentMode, aiThinking: false, locked: false, plates:{p1:[],p2:[]}, plateUsed:false, pendingPlate:null, mpBonus:{}, warcry:{p1:false,p2:false}, firstMoveDone:false, animating:null, pendingFX:[] }; }

let deckSel = { units: [], plates: [] };
function randomPick(arr, n) { const a = [...arr]; const out = []; while (out.length < n && a.length) out.push(a.splice(Math.floor(Math.random()*a.length), 1)[0]); return out; }

function newGame() {
  deckSel = { units: [], plates: [] };
  state = initialState(); state.over = true;
  renderAll(); renderDeckSelect();
  document.getElementById('deck-overlay').classList.add('active');
  document.getElementById('btn-mode').textContent = currentMode === 'solo' ? 'Solo' : 'Hotseat';
}

function renderDeckSelect() {
  document.getElementById('deck-credits').textContent = `◈ ${profile.credits} CREDITS`;
  const ug = document.getElementById('deck-units'); ug.innerHTML = '';
  for (const [key, def] of Object.entries(UNIT_DEFS)) {
    const lvl = profile.owned[key] || 0; const rar = RARITY[key];
    const c = document.createElement('div');
    if (lvl) {
      c.className = 'deck-card' + (deckSel.units.includes(key) ? ' selected' : '');
      const upHtml = lvl < 4 ? ` <span class="up" data-up="${key}">▲ ${UPGRADE_COST[lvl]}</span>` : '';
      c.innerHTML = `<span class="rar rar-${rar}">${rar}</span>${unitVisual(key, 'p1', 38)}<div class="name">${def.name}</div><div class="fac">${def.fac} · ${def.mp} MP</div><div class="lvl">L${lvl}${upHtml}</div>`;
      c.addEventListener('click', (e) => {
        const upKey = e.target.dataset && e.target.dataset.up;
        if (upKey) {
          const cur = profile.owned[upKey]; const cost = UPGRADE_COST[cur];
          if (profile.credits >= cost) { profile.credits -= cost; profile.owned[upKey] = cur + 1; saveProfile(); toast(`${UNIT_DEFS[upKey].name} → L${cur+1}`); }
          else toast('Te weinig credits');
          renderDeckSelect(); return;
        }
        const i = deckSel.units.indexOf(key);
        if (i >= 0) deckSel.units.splice(i, 1); else if (deckSel.units.length < 6) deckSel.units.push(key); else toast('Max 6 units');
        renderDeckSelect();
      });
    } else {
      const price = PRICE[rar];
      c.className = 'deck-card locked';
      c.innerHTML = `<span class="rar rar-${rar}">${rar}</span>${unitVisual(key, 'p1', 38)}<div class="name">${def.name}</div><div class="fac">${def.fac} · ${def.mp} MP</div><div class="price">KOOP ◈ ${price}</div>`;
      c.addEventListener('click', () => {
        if (profile.credits >= price) { profile.credits -= price; profile.owned[key] = 1; saveProfile(); toast(`${def.name} gekocht!`); }
        else toast('Te weinig credits');
        renderDeckSelect();
      });
    }
    ug.appendChild(c);
  }
  const pg = document.getElementById('deck-plates'); pg.innerHTML = '';
  for (const [key, p] of Object.entries(PLATES)) {
    const c = document.createElement('div'); c.className = 'deck-card' + (deckSel.plates.includes(key) ? ' selected' : '');
    c.innerHTML = `<div class="name">${p.name}</div><div class="fac">${p.desc}</div>`;
    c.addEventListener('click', () => { const i = deckSel.plates.indexOf(key); if (i >= 0) deckSel.plates.splice(i, 1); else if (deckSel.plates.length < 3) deckSel.plates.push(key); else toast('Max 3 plates'); renderDeckSelect(); });
    pg.appendChild(c);
  }
  document.getElementById('deck-count-units').textContent = `Units: ${deckSel.units.length} / 6 (collectie: ${Object.keys(profile.owned).length}/18)`;
  document.getElementById('deck-count-plates').textContent = `Plates: ${deckSel.plates.length} / 3`;
  document.getElementById('btn-deck-start').disabled = !(deckSel.units.length === 6 && deckSel.plates.length === 3);
}

function startGame() {
  document.getElementById('deck-overlay').classList.remove('active');
  state = initialState(); let id = 0;
  const mk = (defKey, owner, lvl) => {
    const uid = `u${++id}`;
    const u = { uid, defKey, owner, node:null, status:[], level:1, slots: JSON.parse(JSON.stringify(UNIT_DEFS[defKey].slots)) };
    if (lvl && lvl > 1) { for (let i = 1; i < lvl; i++) levelSlotBoost(u); u.level = lvl; }
    state.units[uid] = u; state.bench[owner].push(uid);
  };
  for (const k of deckSel.units) mk(k, 'p1', profile.owned[k] || 1);
  for (const k of randomPick(Object.keys(UNIT_DEFS), 6)) mk(k, 'p2');
  state.plates.p1 = [...deckSel.plates];
  state.plates.p2 = randomPick(Object.keys(PLATES), 3);
  renderAll();
}

function endMatch(winner, msg) {
  toast(msg);
  if (state.mode === 'solo') {
    const gain = winner === 'p1' ? WIN_CREDITS : LOSS_CREDITS;
    profile.credits += gain; saveProfile();
    setTimeout(() => toast(`+${gain} credits`), 1400);
  }
  setTimeout(() => newGame(), 3000);
}

const SVG_NS = 'http://www.w3.org/2000/svg';
function el(tag, attrs={}, parent=null) { const n = document.createElementNS(SVG_NS, tag); for (const [k,v] of Object.entries(attrs)) n.setAttribute(k, v); if (parent) parent.appendChild(n); return n; }

const STATUS_COLORS = { poison:'#4ade80', badlypoison:'#a855f7', burn:'#fb923c', paralysis:'#fde047', confusion:'#f472b6', sleep:'#93c5fd', frozen:'#7dd3fc', curse:'#7e22ce', bulwark:'#fbbf24', wait:'#9ca3af' };

function statusFX(g, u) {
  const mk = (tag, attrs, anim, delay) => {
    const e = el(tag, attrs, g);
    if (anim) { e.style.transformBox = 'fill-box'; e.style.transformOrigin = 'center'; e.style.animation = anim; if (delay) e.style.animationDelay = delay; e.classList.add('fx-anim'); }
    return e;
  };
  for (const st of u.status.slice(0, 2)) {
    if (st === 'burn') {
      [[-8,'0s'],[1,'.4s'],[8,'.8s']].forEach(([x,d]) => mk('path', { d:`M ${x} 6 q 3 -4 0 -8 q -3 4 0 8`, fill:'#fb923c', stroke:'#fde047', 'stroke-width':0.6 }, 'fxRise 1.2s ease-out infinite', d));
    } else if (st === 'poison' || st === 'badlypoison' || st === 'curse') {
      const c = STATUS_COLORS[st];
      [[-7,'0s'],[2,'.45s'],[8,'.9s']].forEach(([x,d]) => mk('circle', { cx:x, cy:4, r: st==='badlypoison' ? 2.6 : 2, fill:c, opacity:0.85 }, 'fxRise 1.4s ease-out infinite', d));
    } else if (st === 'paralysis') {
      [[-14,'0s'],[12,'.25s']].forEach(([x,d]) => mk('polyline', { points:`${x},-30 ${x+4},-25 ${x+1},-25 ${x+5},-19`, fill:'none', stroke:'#fde047', 'stroke-width':1.6, 'stroke-linecap':'round' }, 'fxFlicker .6s linear infinite', d));
    } else if (st === 'confusion') {
      const orb = el('g', {}, g);
      orb.style.transformBox = 'fill-box'; orb.style.transformOrigin = 'center';
      orb.style.animation = 'fxOrbit 1.6s linear infinite'; orb.classList.add('fx-anim');
      el('circle', { cx:-9, cy:-54, r:2.2, fill:'#f472b6' }, orb);
      el('circle', { cx:9, cy:-54, r:1.6, fill:'#fbcfe8' }, orb);
    } else if (st === 'sleep') {
      [[8,-48,9,'0s'],[14,-54,7,'.7s']].forEach(([x,y,fs,d]) => { const t = mk('text', { x, y, 'font-size':fs, fill:'#93c5fd', 'font-weight':'700', 'font-family':'Georgia,serif' }, 'fxRise 1.8s ease-out infinite', d); t.textContent = 'z'; });
    } else if (st === 'frozen') {
      const ice = el('g', {}, g);
      ice.style.transformBox = 'fill-box'; ice.style.transformOrigin = 'center';
      ice.style.animation = 'fxBob 2.2s ease-in-out infinite'; ice.classList.add('fx-anim');
      el('polygon', { points:'-11,8 -8,-3 -5,8', fill:'#bae6fd', stroke:'#7dd3fc', 'stroke-width':0.7, opacity:0.92 }, ice);
      el('polygon', { points:'4,8 7,-5 10,8', fill:'#e0f2fe', stroke:'#7dd3fc', 'stroke-width':0.7, opacity:0.92 }, ice);
      el('polygon', { points:'-3,9 -1,1 1,9', fill:'#bae6fd', stroke:'#7dd3fc', 'stroke-width':0.6, opacity:0.85 }, ice);
    } else if (st === 'bulwark') {
      mk('path', { d:'M -14 -30 A 16 10 0 0 1 14 -30', fill:'none', stroke:'#fbbf24', 'stroke-width':2, 'stroke-linecap':'round' }, 'fxFlicker 1.6s ease-in-out infinite');
    }
  }
}

function unitGroup(u, withShadow = true) {
  const g = document.createElementNS(SVG_NS, 'g');
  if (withShadow) el('ellipse', { cx:0, cy:11, rx:21, ry:7.5, fill:'rgba(0,0,0,0.4)' }, g);
  const side = u.owner==='p1' ? '#11255c' : '#4c0f0f'; const rim = u.owner==='p1' ? '#60a5fa' : '#f87171';
  el('ellipse', { cx:0, cy:5, rx:19, ry:9, fill:side, stroke:'rgba(0,0,0,0.45)', 'stroke-width':1 }, g);
  el('ellipse', { class:'fig-base', cx:0, cy:0, rx:19, ry:9, fill:`url(#gBaseTop${u.owner==='p1'?'P1':'P2'})`, stroke:rim, 'stroke-width':1.5 }, g);
  el('path', { d:'M -12 -2.5 A 14 6 0 0 1 12 -2.5', fill:'none', stroke:'rgba(255,255,255,0.35)', 'stroke-width':1.5, 'stroke-linecap':'round' }, g);
  const art = UNIT_ART[u.defKey];
  if (art) {
    el('image', { x:-17, y:-49, width:34, height:48, href:art }, g);
  } else {
    const fo = document.createElementNS(SVG_NS, 'foreignObject');
    fo.setAttribute('x',-15); fo.setAttribute('y',-22); fo.setAttribute('width',30); fo.setAttribute('height',26);
    fo.innerHTML = unitSilhouette(u.defKey, u.owner); g.appendChild(fo);
  }
  if (u.level > 1) { el('rect', { x:-24, y:-21, width:17, height:11, rx:3, fill:'#fbbf24', stroke:'#000', 'stroke-width':1 }, g); const lt = el('text', { x:-15.5, y:-12.5, 'font-size':8, 'text-anchor':'middle', fill:'#000', 'font-weight':'900', 'font-family':'sans-serif' }, g); lt.textContent = 'L' + u.level; }
  if (u.status.length) {
    const c = STATUS_COLORS[u.status[0]] || '#f59e0b';
    el('circle', { cx:14, cy:-16, r:7, fill:c, stroke:'#000', 'stroke-width':1 }, g);
    const t = el('text', { x:14, y:-12, 'font-size':10, 'text-anchor':'middle', fill:'#000', 'font-weight':'900', 'font-family':'sans-serif' }, g);
    t.textContent = u.status[0][0].toUpperCase();
  }
  statusFX(g, u);
  return g;
}

function renderBoard() {
  const svg = document.getElementById('board'); svg.innerHTML = BOARD_DEFS;
  const gHalo = el('g', {}, svg), gRoute = el('g', {}, svg);
  for (const [a,b] of ROUTES) { const A = NODES[a], B = NODES[b]; el('line', { x1:A.x, y1:A.y, x2:B.x, y2:B.y, class:'route-halo' }, gHalo); el('line', { x1:A.x, y1:A.y, x2:B.x, y2:B.y, class:'route-core' }, gRoute); }
  const gNodes = el('g', {}, svg);
  for (const [key, n] of Object.entries(NODES)) {
    const g = el('g', { 'data-node':key, style:'cursor:pointer;' }, gNodes);
    if (n.type === 'entry') { 
      el('circle', { cx:n.x, cy:n.y, r:24, class:'node-glow', id:`glow-${key}` }, g); 
      el('circle', { cx:n.x, cy:n.y, r:18, fill:'url(#gNode)', class: 'entry-ring ' + n.owner }, g); 
      el('circle', { cx:n.x, cy:n.y, r:6, fill: n.owner==='p1' ? '#3b82f6' : '#ef4444', opacity:0.9 }, g); 
      el('ellipse', { cx:n.x-4, cy:n.y-6, rx:6, ry:3.5, fill:'rgba(255,255,255,0.16)' }, g);
    }
    else if (n.type === 'goal') { 
      el('circle', { cx:n.x, cy:n.y, r:26, class:'goal-halo ' + n.owner }, g);
      el('circle', { cx:n.x, cy:n.y, r:24, class:'node-glow', id:`glow-${key}` }, g); 
      el('circle', { cx:n.x, cy:n.y, r:18, fill: n.owner==='p1' ? 'url(#gGoalBlue)' : 'url(#gGoalGold)', stroke:'#fff', 'stroke-width':2 }, g); 
      const tri = n.owner==='p2' ? `${n.x},${n.y+7} ${n.x-8},${n.y-5} ${n.x+8},${n.y-5}` : `${n.x},${n.y-7} ${n.x-8},${n.y+5} ${n.x+8},${n.y+5}`; 
      el('polygon', { points:tri, fill:'rgba(0,0,0,0.85)' }, g); 
      el('ellipse', { cx:n.x-5, cy:n.y-8, rx:8, ry:4, fill:'rgba(255,255,255,0.3)' }, g);
    }
    else { 
      el('circle', { cx:n.x, cy:n.y, r:16, class:'node-glow', id:`glow-${key}` }, g); 
      el('circle', { cx:n.x, cy:n.y, r:11.5, fill:'url(#gNode)', class:'node-rim' }, g); 
      el('ellipse', { cx:n.x-3, cy:n.y-4, rx:4.5, ry:2.8, fill:'rgba(255,255,255,0.18)' }, g);
    }
    g.addEventListener('click', () => onNodeTap(key));
  }
  const gUnits = el('g', {}, svg);
  for (const u of Object.values(state.units)) {
    if (!u.node || state.animating === u.uid) continue; const n = NODES[u.node];
    const g = unitGroup(u);
    g.setAttribute('class', 'unit-fig' + (state.selected===u.uid?' selected':''));
    g.setAttribute('transform', `translate(${n.x},${n.y})`);
    g.setAttribute('data-uid', u.uid);
    g.addEventListener('click', e => { e.stopPropagation(); onUnitTap(u.uid); });
    gUnits.appendChild(g);
  }
  for (const t of state.legalTargets) { const glow = document.getElementById(`glow-${t}`); if (glow) glow.classList.add('active'); }
}

function renderBench() {
  for (const player of ['p1','p2']) {
    const div = document.getElementById(`bench-${player}`); div.innerHTML = ''; div.classList.toggle('dim', state.turn !== player);
    const uids = state.bench[player];
    if (uids.length === 0) { const e = document.createElement('div'); e.style = 'flex:1;display:flex;align-items:center;justify-content:center;color:#555;font-style:italic;font-size:0.85rem;'; e.textContent = 'Leeg'; div.appendChild(e); continue; }
    for (const uid of uids) {
      const u = state.units[uid]; const card = document.createElement('div'); card.className = `bench-card ${player}` + (state.pendingDeploy===uid?' selected':'');
      card.innerHTML = `<div class="mp-badge">${UNIT_DEFS[u.defKey].mp}</div><div>${unitVisual(u.defKey, player, 40)}</div><div class="sokkel"></div><div class="name">${UNIT_DEFS[u.defKey].name.split(' ').pop()}</div>`;
      if(u.status.includes('wait')) { card.style.opacity = '0.3'; card.style.filter = 'grayscale(1)'; }
      card.addEventListener('click', () => onBenchTap(uid)); div.appendChild(card);
    }
  }
}

function renderTurnBanner() {
  document.getElementById('turn-banner').className = `turn-banner ${state.turn}`;
  let name = state.turn==='p1' ? 'Speler 1 (Blauw)' : (state.mode==='solo' ? 'AI Systeem (Rood)' : 'Speler 2 (Rood)');
  if (state.aiThinking) name += ' [Berekent...]';
  document.getElementById('turn-name').textContent = name;
  document.getElementById('turn-actions').textContent = `${state.actionsLeft} ACTIE${state.actionsLeft===1?'':'S'}`;
}

function renderPlates() {
  const div = document.getElementById('plate-strip'); div.innerHTML = '';
  const player = (state.mode === 'solo') ? 'p1' : state.turn;
  const plates = state.plates[player] || [];
  if (!plates.length) { div.style.display = 'none'; return; }
  div.style.display = 'flex';
  const mine = player === state.turn && !state.over;
  plates.forEach((key, idx) => {
    const c = document.createElement('div');
    c.className = 'plate-chip' + (state.pendingPlate && state.pendingPlate.idx === idx && mine ? ' selected' : '') + ((!mine || state.plateUsed) ? ' disabled' : '');
    c.innerHTML = `<b>${PLATES[key].name}</b><span>${PLATES[key].desc}</span>`;
    c.addEventListener('click', () => { if (mine) onPlateTap(idx); });
    div.appendChild(c);
  });
}

function onPlateTap(idx) {
  if (state.over || state.locked) return;
  const player = state.turn;
  if (state.plateUsed) { toast('Al een plate gebruikt deze beurt'); return; }
  if (state.pendingPlate && state.pendingPlate.idx === idx) { state.pendingPlate = null; state.legalTargets = new Set(); renderAll(); return; }
  const key = state.plates[player][idx]; const pl = PLATES[key];
  if (pl.target === 'none') { usePlate(player, idx); return; }
  state.pendingPlate = { idx, key, stage: 1 }; state.selected = null; state.pendingDeploy = null;
  state.legalTargets = new Set();
  for (const u of Object.values(state.units)) {
    if (!u.node) continue;
    if ((pl.target === 'enemy' && u.owner !== player) || ((pl.target === 'ally' || pl.target === 'ally-then-node') && u.owner === player)) state.legalTargets.add(u.node);
  }
  if (state.legalTargets.size === 0) { state.pendingPlate = null; toast('Geen geldig doelwit'); renderAll(); return; }
  toast(`${pl.name}: kies doelwit`); renderAll();
}

function usePlate(player, idx, targetUid, targetNode) {
  const key = state.plates[player][idx]; const pl = PLATES[key];
  const u = targetUid ? state.units[targetUid] : null;
  if (key === 'rally') { state.mpBonus[u.uid] = (state.mpBonus[u.uid] || 0) + 1; }
  else if (key === 'warcry') { state.warcry[player] = true; }
  else if (key === 'cleanse') { u.status = u.status.filter(s => s === 'wait' || s === 'bulwark'); }
  else if (key === 'bulwark') { if (!u.status.includes('bulwark')) u.status.push('bulwark'); }
  else if (key === 'recall') { u.node = null; state.bench[player].push(u.uid); }
  else if (key === 'blink') { u.node = targetNode; }
  else if (pl.status) { if (!u.status.includes(pl.status)) u.status.push(pl.status); }
  state.plates[player].splice(idx, 1); state.plateUsed = true; state.pendingPlate = null; state.legalTargets = new Set();
  toast(`${pl.name} gebruikt`); renderAll();
}

function queueFX(x, y, kind) { (state.pendingFX = state.pendingFX || []).push({ x, y, kind }); }
function flushFX() { const list = state.pendingFX || []; state.pendingFX = []; for (const f of list) spawnFX(f.x, f.y, f.kind); }
function spawnFX(x, y, kind) {
  if (window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const svg = document.getElementById('board');
  const g = el('g', {}, svg);
  const n = kind === 'poof' ? 4 : 7;
  for (let i = 0; i < n; i++) {
    const a = (Math.PI * 2 * i) / n + Math.random() * 0.5;
    const col = kind === 'poof' ? 'rgba(210,210,225,0.85)' : (i % 2 ? '#fde047' : '#f87171');
    const c = el('circle', { cx: x + Math.cos(a) * 6, cy: y + Math.sin(a) * 4, r: kind === 'poof' ? 2.2 : 3, fill: col }, g);
    c.style.transformBox = 'fill-box'; c.style.transformOrigin = 'center';
    c.style.animation = (kind === 'poof' ? 'fxPoof .4s' : 'fxBurst .55s') + ' ease-out forwards';
    c.style.animationDelay = (i * 0.02) + 's';
  }
  setTimeout(() => { if (g.parentNode) g.parentNode.removeChild(g); }, 800);
}

function renderAll() { renderBoard(); renderBench(); renderTurnBanner(); renderPlates(); flushFX(); }

function onBenchTap(uid) {
  if (state.over || state.locked) return; const u = state.units[uid];
  if (u.owner !== state.turn) { toast('Niet jouw beurt'); return; }
  if (u.status.includes('wait')) { toast('Unit herstelt nog'); return; }
  if (state.actionsLeft <= 0) { toast('Geen acties over'); return; }

  if (state.pendingDeploy === uid) { state.pendingDeploy = null; state.legalTargets = new Set(); } 
  else {
    state.selected = null; state.pendingDeploy = uid; state.legalTargets = deployTargets(u);
    if (state.legalTargets.size === 0) { state.pendingDeploy = null; toast('Entries geblokkeerd'); }
  }
  renderAll();
}

function onNodeTap(nodeKey) {
  if (state.over || state.locked || !state.legalTargets.has(nodeKey)) return;
  if (state.pendingPlate && state.pendingPlate.stage === 2) { usePlate(state.turn, state.pendingPlate.idx, state.pendingPlate.uid, nodeKey); return; }
  if (state.pendingPlate) return;
  if (state.pendingDeploy) {
    state.locked = true; const uid = state.pendingDeploy; const u = state.units[uid];
    state.pendingDeploy = null; state.legalTargets = new Set();
    doDeploy(u, nodeKey).then(() => { state.actionsLeft--; state.locked = false; afterAction(); });
    return;
  }
  if (state.selected) {
    state.locked = true; 
    const u = state.units[state.selected];
    const targetUnit = unitAt(nodeKey);

    if (targetUnit && targetUnit.owner !== u.owner) {
      const path = bfs(u.node, nodeKey);
      if (path && path.length > 1) {
        const standNode = path[path.length - 2];
        if (standNode !== u.node) { moveUnit(u, standNode).then(() => { state.actionsLeft--; runCombat(u, targetUnit); }); } 
        else { state.actionsLeft--; runCombat(u, targetUnit); }
      }
      return;
    }

    moveUnit(u, nodeKey).then(() => { 
      const goal = NODES[nodeKey]; if (goal.type==='goal' && goal.owner !== u.owner) { endMatch(u.owner, 'DOEL BEREIKT!'); return; } 
      state.selected = null; state.legalTargets = new Set(); state.actionsLeft--; state.locked = false; afterAction(); 
    });
  }
}

function moveUnit(u, end) {
  return new Promise(res => {
    const path = bfs(u.node, end);
    if (!path || path.length < 2) { u.node = end; renderAll(); res(); return; }
    const reduced = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) { let i = 1; const step = () => { u.node = path[i]; renderAll(); i++; if (i < path.length) setTimeout(step, 120); else res(); }; setTimeout(step, 80); return; }
    state.animating = u.uid;
    renderAll(); // één keer: statische figuur verbergen, daarna alleen de ghost bewegen
    const svg = document.getElementById('board');
    const shadow = el('ellipse', { cx:0, cy:0, rx:21, ry:7.5, fill:'rgba(0,0,0,0.45)' }, svg);
    const ghost = unitGroup(u, false); ghost.style.transition = 'none'; svg.appendChild(ghost);
    let seg = 0;
    const hopOne = () => {
      const A = NODES[path[seg]], B = NODES[path[seg + 1]];
      const dur = 250;
      let t = 0, last = performance.now();
      const frame = (now) => {
        // Tijdstap klemmen: bij haperende frames vertraagt de sprong i.p.v. overslaan
        t = Math.min(1, t + Math.min((now - last) / dur, 0.16));
        last = now;
        const gx = A.x + (B.x - A.x) * t, gy = A.y + (B.y - A.y) * t;   // grondpositie
        const lift = Math.sin(Math.PI * t) * 24;                          // boogje
        let sy = 1, sx = 1;
        if (t > 0.88) { const k = (t - 0.88) / 0.12; sy = 1 - 0.14 * k; sx = 1 + 0.09 * k; } // landing-squash
        ghost.setAttribute('transform', `translate(${gx},${gy - lift}) scale(${sx},${sy})`);
        const sh = 1 - (lift / 24) * 0.45;                                 // schaduw krimpt op het hoogste punt
        shadow.setAttribute('cx', gx); shadow.setAttribute('cy', gy + 11);
        shadow.setAttribute('rx', 21 * sh); shadow.setAttribute('ry', 7.5 * sh);
        shadow.setAttribute('fill', `rgba(0,0,0,${0.45 * (0.55 + 0.45 * sh)})`);
        if (t < 1) requestAnimationFrame(frame);
        else {
          spawnFX(B.x, B.y + 9, 'poof');
          u.node = path[seg + 1]; seg++;
          if (seg < path.length - 1) hopOne();
          else { svg.removeChild(ghost); svg.removeChild(shadow); state.animating = null; renderAll(); res(); }
        }
      };
      requestAnimationFrame(frame);
    };
    hopOne();
  });
}

function bfs(start, end) {
  const q = [[start]], seen = new Set([start]);
  while (q.length) { const p = q.shift(); const last = p[p.length-1]; if (last === end) return p; for (const n of ADJ[last]) { if (seen.has(n)) continue; if (n !== end && unitAt(n)) continue; seen.add(n); q.push([...p, n]); } } return null;
}

function onUnitTap(uid) {
  if (state.over || state.locked) return; const u = state.units[uid];
  if (state.pendingPlate && state.pendingPlate.stage === 1) {
    if (u.node && state.legalTargets.has(u.node)) {
      const pp = state.pendingPlate;
      if (pp.key === 'blink') {
        pp.uid = uid; pp.stage = 2;
        state.legalTargets = new Set([...ADJ[u.node]].filter(n => !unitAt(n) && NODES[n].type !== 'goal'));
        if (!state.legalTargets.size) { state.pendingPlate = null; state.legalTargets = new Set(); toast('Geen vrij buurpunt'); }
        else toast('Blink: kies bestemming');
        renderAll(); return;
      }
      usePlate(state.turn, pp.idx, uid); return;
    }
    toast('Ongeldig doelwit'); return;
  }
  if (u.owner === state.turn && u.node) {
    if (state.actionsLeft<=0) { toast('Geen acties over'); return; }
    if (u.status.includes('sleep')) { toast(`${UNIT_DEFS[u.defKey].name} slaapt`); return; }
    state.pendingDeploy = null; state.selected = (state.selected===uid) ? null : uid; state.legalTargets = state.selected ? legalMoves(u) : new Set(); renderAll(); return;
  }
  if (u.owner !== state.turn && u.node && state.selected) { 
     if (state.legalTargets.has(u.node)) { onNodeTap(u.node); } else { toast('Buiten bereik'); }
  }
}

function effMP(u) {
  let mp = Math.min(3, UNIT_DEFS[u.defKey].mp + (state.mpBonus[u.uid] || 0) + (state.warcry[u.owner] ? 1 : 0));
  if (!state.firstMoveDone) mp = Math.max(1, mp - 1); // Duel: allereerste zet van het potje MP-1
  return mp;
}

// Duel: deployen via entry kost 1 MP; resterende MP mag direct doorbewegen (alleen naar lege punten)
function deployTargets(u) {
  const budget = effMP(u) - 1;
  const out = new Set();
  for (const [k, n] of Object.entries(NODES)) {
    if (n.type !== 'entry' || n.owner !== u.owner || unitAt(k)) continue;
    out.add(k);
    const seen = new Map([[k, 0]]), q = [[k, 0]];
    while (q.length) { const [nd, d] = q.shift(); if (d >= budget) continue; for (const nx of ADJ[nd]) { if (unitAt(nx)) continue; if (seen.has(nx) && seen.get(nx) <= d + 1) continue; seen.set(nx, d + 1); out.add(nx); q.push([nx, d + 1]); } }
  }
  return out;
}

function doDeploy(u, target) {
  let entry = null, best = Infinity;
  for (const [k, n] of Object.entries(NODES)) {
    if (n.type !== 'entry' || n.owner !== u.owner || unitAt(k)) continue;
    if (k === target) { entry = k; best = 0; break; }
    const p = bfs(k, target); if (p && p.length - 1 < best) { best = p.length - 1; entry = k; }
  }
  u.node = entry;
  state.bench[u.owner] = state.bench[u.owner].filter(x => x !== u.uid);
  if (target === entry || !entry) { renderAll(); return Promise.resolve(); }
  return moveUnit(u, target);
}

function legalMoves(u) {
  const frozen = u.status.includes('frozen');
  const mp = effMP(u);
  const out = new Set(), seen = new Map([[u.node, 0]]), q = [[u.node, 0]];
  while (q.length) { const [n, d] = q.shift(); if (d >= mp) continue; for (const nx of ADJ[n]) { const occ = unitAt(nx); if (occ && occ.owner !== u.owner) { if (!frozen) out.add(nx); continue; } if (occ) continue; if (seen.has(nx) && seen.get(nx) <= d+1) continue; seen.set(nx, d+1); out.add(nx); q.push([nx, d+1]); } } return out;
}

function unitAt(k) { return Object.values(state.units).find(u => u.node === k); }

function checkSurround() {
  // Duel: figure zonder vrij buurpunt en met minstens één aangrenzende vijand gaat direct KO
  for (const u of Object.values(state.units)) {
    if (!u.node) continue;
    const adj = [...ADJ[u.node]];
    if (adj.some(n => !unitAt(n))) continue;
    if (!adj.some(n => { const o = unitAt(n); return o && o.owner !== u.owner; })) continue;
    queueFX(NODES[u.node].x, NODES[u.node].y, 'burst');
    u.node = null; u.status = ['wait']; state.bench[u.owner].push(u.uid);
    toast(`${UNIT_DEFS[u.defKey].name} omsingeld — KO!`);
  }
}

function afterAction() {
  state.firstMoveDone = true;
  checkSurround();
  if (state.actionsLeft<=0 && !hasAnyAction(state.turn)) { endMatch(state.turn==='p1'?'p2':'p1', 'Lockout!'); return; }
  renderAll(); if (state.mode === 'solo' && state.turn === 'p2' && state.actionsLeft <= 0 && !state.over) { setTimeout(endTurn, 600); }
}

function hasAnyAction(player) {
  if (state.bench[player].length > 0) { for (const [k,n] of Object.entries(NODES)) if (n.type==='entry' && n.owner===player && !unitAt(k)) return true; }
  for (const u of Object.values(state.units)) { if (u.owner !== player || !u.node) continue; if (u.status.includes('sleep')) continue; if (legalMoves(u).size > 0) return true; } return false;
}

function endTurn() {
  if (state.over || state.locked) return;
  for (const u of Object.values(state.units)) { if (!u.node) continue; if (u.status.includes('sleep')||u.status.includes('frozen')) { const hasAdj = [...ADJ[u.node]].some(n => { const o = unitAt(n); return o && o.owner === u.owner; }); if (hasAdj) u.status = u.status.filter(s => s!=='sleep' && s!=='frozen'); } }
  state.turn = state.turn==='p1'?'p2':'p1'; state.actionsLeft = 1; state.selected = null; state.pendingDeploy = null; state.legalTargets = new Set();
  state.plateUsed = false; state.pendingPlate = null; state.mpBonus = {}; state.warcry = { p1:false, p2:false };
  for (const uid of state.bench[state.turn]) { const u = state.units[uid]; if (u.status.includes('wait')) u.status = u.status.filter(s => s !== 'wait'); }
  renderAll(); if (!hasAnyAction(state.turn)) { endMatch(state.turn==='p1'?'p2':'p1', 'Lockout!'); return; }
  if (state.mode === 'solo' && state.turn === 'p2') { setTimeout(aiTurn, 400); }
}

const SLOT_COUNT = 16, SLOT_DEG = 22.5;
const COLORS = { white:'#e5e7eb', purple:'#8b5cf6', blue:'#3b82f6', gold:'#fbbf24', red:'#ef4444' };
const TXT = { white:'#000', purple:'#fff', blue:'#fff', gold:'#000', red:'#fff' };

function renderDisk(svgId, slots) {
  const svg = document.getElementById(svgId); svg.innerHTML = ''; svg.style.transition = 'none'; svg.style.transform = 'rotate(0deg)'; svg.getBoundingClientRect();
  const cx=120, cy=120, R=105, IR=28; el('circle', { cx, cy, r: R+10, fill:'#1f1814', stroke:'#fbbf24', 'stroke-width':4, filter:'drop-shadow(0 0 10px rgba(0,0,0,0.8))' }, svg);
  const merged = []; let i = 0;
  while (i < slots.length) { let j = i; while (j < slots.length && slots[i].k===slots[j].k && slots[i].v===slots[j].v && slots[i].stars===slots[j].stars) j++; merged.push({ slot: slots[i], start:i, end:j }); i = j; }
  for (const m of merged) {
    const sA = (m.start*SLOT_DEG - 90)*Math.PI/180, eA = (m.end*SLOT_DEG - 90)*Math.PI/180, mA = (sA+eA)/2;
    const x1 = cx+R*Math.cos(sA), y1=cy+R*Math.sin(sA), x2 = cx+R*Math.cos(eA), y2=cy+R*Math.sin(eA);
    const ix1 = cx+IR*Math.cos(sA), iy1=cy+IR*Math.sin(sA), ix2 = cx+IR*Math.cos(eA), iy2=cy+IR*Math.sin(eA);
    const large = (m.end-m.start)*SLOT_DEG > 180 ? 1 : 0;
    const d = `M ${ix1} ${iy1} L ${x1} ${y1} A ${R} ${R} 0 ${large} 1 ${x2} ${y2} L ${ix2} ${iy2} A ${IR} ${IR} 0 ${large} 0 ${ix1} ${iy1} Z`;
    el('path', { d, fill: COLORS[m.slot.k], stroke:'#000', 'stroke-width':2 }, svg);
    const lr = (R+IR)/2 + 4, lx = cx+lr*Math.cos(mA), ly = cy+lr*Math.sin(mA);
    let label = ''; if (m.slot.k==='white'||m.slot.k==='gold') label = String(m.slot.v); else if (m.slot.k==='purple') label = '★'.repeat(m.slot.stars||1); else if (m.slot.k==='blue') label = '◆'; else if (m.slot.k==='red') label = '×';
    const t = el('text', { x:lx, y:ly, fill:TXT[m.slot.k], 'font-family':"'Cinzel', serif", 'font-weight':'900', 'font-size': (m.slot.k==='white'||m.slot.k==='gold')?24:20, 'text-anchor':'middle', 'dominant-baseline':'middle' }, svg); t.textContent = label;
  }
  el('circle', { cx, cy, r: IR, fill:'#0a0806', stroke:'#fbbf24', 'stroke-width':3 }, svg);
}

function spin(svgId, ms) {
  return new Promise(res => {
    const svg = document.getElementById(svgId);
    const idx = Math.floor(Math.random()*SLOT_COUNT);
    const fullRots = 5 + Math.floor(Math.random()*2);
    const deg = 360*fullRots - ((idx+0.5)*SLOT_DEG);
    svg.style.transition = `transform ${ms}ms cubic-bezier(0.15, 0.85, 0.1, 1)`;
    svg.getBoundingClientRect(); svg.style.transform = `rotate(${deg}deg)`;
    setTimeout(() => { res(idx); }, ms+100);
  });
}

function applyStatus(slots, st) {
  let r = slots.map(s => ({...s}));
  if (st.includes('paralysis') || st.includes('burn')) {
    let minV = Infinity;
    for (let s of r) if (s.k==='white' && s.v < minV) minV = s.v;
    if (minV !== Infinity) { for (let i=0; i<r.length; i++) if (r[i].k==='white' && r[i].v === minV) r[i] = {k:'red'}; }
  }
  let mod = 0;
  if (st.includes('poison')) mod -= 20;
  if (st.includes('badlypoison')) mod -= 40;
  if (st.includes('burn')) mod -= 10;
  if (mod) for (let s of r) if (s.k==='white' || s.k==='gold') s.v = Math.max(10, s.v + mod);
  return r;
}

function noEffectReason(a, d) {
  if (a.k==='red' && d.k==='red') return 'Beide Miss'; if (a.k==='blue' && d.k==='blue') return 'Beide ontwijken';
  if ((a.k==='red' && d.k==='blue') || (a.k==='blue' && d.k==='red')) return 'Miss vs Ontwijken';
  if (a.k==='blue') return `Aanval ontweken`; if (d.k==='blue') return `Aanval ontweken`;
  if (a.k==='purple' && d.k==='purple') return `Krachten heffen op`;
  if ((a.k==='white'||a.k==='gold') && (d.k==='white'||d.k==='gold')) return `Gelijke Strijd (${a.v} = ${d.v})`;
  return 'Geen effect';
}

async function runCombat(att, def) {
  state.locked = true;
  const defInitialNode = def.node; const attInitialNode = att.node; 
  
  state.selected = null; const ov = document.getElementById('combat-overlay');
  const attDiskId = att.owner === 'p2' ? 'disk-top' : 'disk-bottom', defDiskId = def.owner === 'p2' ? 'disk-top' : 'disk-bottom';
  document.getElementById(att.owner==='p2'?'combat-top-name':'combat-bottom-name').textContent = UNIT_DEFS[att.defKey].name;
  document.getElementById(def.owner==='p2'?'combat-top-name':'combat-bottom-name').textContent = UNIT_DEFS[def.defKey].name;

  const aSlots = applyStatus(att.slots, att.status), dSlots = applyStatus(def.slots, def.status);
  renderDisk(attDiskId, aSlots); renderDisk(defDiskId, dSlots);
  document.getElementById('combat-result').textContent = ''; document.getElementById('btn-combat-continue').style.display = 'none';
  ov.classList.add('active');

  const [aIdx, dIdx] = await Promise.all([spin(attDiskId, 2800 + Math.random()*400), spin(defDiskId, 3400 + Math.random()*400)]);

  let finalAIdx = aIdx, finalDIdx = dIdx;
  if (att.status.includes('confusion')) finalAIdx = (finalAIdx + 1) % 16;
  if (def.status.includes('confusion')) finalDIdx = (finalDIdx + 1) % 16;

  let aSlot = att.status.includes('frozen') ? {k:'red'} : aSlots[finalAIdx];
  let dSlot = def.status.includes('frozen') ? {k:'red'} : dSlots[finalDIdx];

  if (att.status.includes('bulwark')) { att.status = att.status.filter(s => s !== 'bulwark'); if (aSlot.k === 'red') aSlot = {k:'blue'}; }
  if (def.status.includes('bulwark')) { def.status = def.status.filter(s => s !== 'bulwark'); if (dSlot.k === 'red') dSlot = {k:'blue'}; }

  const r = resolve(aSlot, dSlot); let html = "";
  
  let attNextNode = att.node;
  let defNextNode = def.node;
  let attToBench = false;
  let defToBench = false;

  if (r.attKO) { html += `<span class="ko">${UNIT_DEFS[att.defKey].name} is verslagen!</span><br>`; attNextNode = null; attToBench = true; }
  if (r.defKO) { html += `<span class="ko">${UNIT_DEFS[def.defKey].name} is verslagen!</span><br>`; defNextNode = null; defToBench = true; }
  
  if (r.defKO && !r.attKO) { attNextNode = defInitialNode; } 
  
  if (r.statusOnAtt) { if (!att.status.includes(r.statusOnAtt)) att.status.push(r.statusOnAtt); html += `<span class="status">-> ${r.statusOnAtt.toUpperCase()}</span><br>`; }
  if (r.statusOnDef) { if (!def.status.includes(r.statusOnDef)) def.status.push(r.statusOnDef); html += `<span class="status">-> ${r.statusOnDef.toUpperCase()}</span><br>`; }
  if (!r.attKO && !r.defKO && !r.statusOnAtt && !r.statusOnDef) html += `<span style="opacity:0.8;font-style:italic">${noEffectReason(aSlot, dSlot)}</span>`;
  
  document.getElementById('combat-result').innerHTML = html;
  const btn = document.getElementById('btn-combat-continue'); btn.style.display = ''; setTimeout(() => btn.scrollIntoView({ behavior: 'smooth', block: 'center' }), 50);
  await new Promise(res => { btn.onclick = res; }); ov.classList.remove('active');

  att.node = attNextNode;
  def.node = defNextNode;
  if (attToBench) { att.status.push('wait'); state.bench[att.owner].push(att.uid); queueFX(NODES[attInitialNode].x, NODES[attInitialNode].y, 'burst'); }
  if (defToBench) { def.status.push('wait'); state.bench[def.owner].push(def.uid); queueFX(NODES[defInitialNode].x, NODES[defInitialNode].y, 'burst'); }

  if (r.defKO && !r.attKO) levelUp(att);
  if (r.attKO && !r.defKO) levelUp(def);

  if (r.defKO && !r.attKO && att.node) {
    if (NODES[att.node].type==='goal' && NODES[att.node].owner !== att.owner) { endMatch(att.owner, 'DOEL BEREIKT!'); return; }
  }
  state.locked = false;
  afterAction();
}

function resolve(a, d) {
  const o = { attKO:false, defKO:false, statusOnAtt:null, statusOnDef:null }; const A = a.k, D = d.k;
  if (A==='red' && D==='red') return o; if (A==='blue' && D==='blue') return o; if (A==='red' && D==='blue') return o; if (D==='red' && A==='blue') return o;
  if (A==='red' && (D==='white' || D==='gold')) { o.attKO = true; return o; } if (D==='red' && (A==='white' || A==='gold')) { o.defKO = true; return o; }
  if (A==='red' && D==='purple') { o.statusOnAtt = d.effect || 'confusion'; return o; } if (D==='red' && A==='purple') { o.statusOnDef = a.effect || 'confusion'; return o; }
  if (A==='blue' && (D==='white' || D==='purple')) return o; if (D==='blue' && (A==='white' || A==='purple')) return o;
  if (A==='blue' && D==='gold') { o.attKO = true; return o; } if (D==='blue' && A==='gold') { o.defKO = true; return o; }
  if (A==='gold' && D==='purple') { o.defKO = true; return o; } if (D==='gold' && A==='purple') { o.attKO = true; return o; }
  if (A==='purple' && D==='white') { o.statusOnDef = a.effect || 'confusion'; return o; } if (D==='purple' && A==='white') { o.statusOnAtt = d.effect || 'confusion'; return o; }
  if (A==='purple' && D==='purple') { const aS = a.stars||1, dS = d.stars||1; if (aS > dS) o.statusOnDef = a.effect || 'confusion'; else if (dS > aS) o.statusOnAtt = d.effect || 'confusion'; return o; }
  if ((A==='white'||A==='gold') && (D==='white'||D==='gold')) { const aV = a.v||0, dV = d.v||0; if (aV > dV) o.defKO = true; else if (dV > aV) o.attKO = true; } return o;
}

function levelSlotBoost(u) {
  const ri = u.slots.findIndex(s => s.k === 'red'); if (ri < 0) return;
  let bestIdx = -1, bestV = -1;
  for (let i = 0; i < u.slots.length; i++) { const s = u.slots[i]; if ((s.k==='white' || s.k==='gold') && s.v > bestV) { bestV = s.v; bestIdx = i; } }
  if (bestIdx < 0) return;
  const copy = {...u.slots[bestIdx]};
  u.slots.splice(ri, 1);
  const insertAt = u.slots.findIndex(s => s.k === copy.k && s.v === copy.v);
  u.slots.splice(insertAt >= 0 ? insertAt : 0, 0, copy);
}

function levelUp(u) {
  if (u.level >= 4) return; u.level++;
  levelSlotBoost(u);
  toast(`${UNIT_DEFS[u.defKey].name} → Level ${u.level}!`);
}

let toastT; function toast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); clearTimeout(toastT); toastT = setTimeout(() => t.classList.remove('show'), 2000); }

document.getElementById('btn-end-turn').addEventListener('click', endTurn); document.getElementById('btn-reset').addEventListener('click', newGame); document.getElementById('btn-mode').addEventListener('click', () => { currentMode = currentMode === 'solo' ? 'hotseat' : 'solo'; newGame(); });
document.getElementById('btn-deck-random').addEventListener('click', () => { const owned = Object.keys(profile.owned); deckSel.units = randomPick(owned, Math.min(6, owned.length)); deckSel.plates = randomPick(Object.keys(PLATES), 3); renderDeckSelect(); });
document.getElementById('btn-deck-start').addEventListener('click', () => { if (deckSel.units.length === 6 && deckSel.plates.length === 3) startGame(); });

const AI = 'p2';

function distTo(start, goalKey) {
  if (start === goalKey) return 0;
  const q = [[start, 0]], seen = new Set([start]);
  while (q.length) { const [n, d] = q.shift(); for (const nx of ADJ[n]) { if (seen.has(nx)) continue; if (nx === goalKey) return d + 1; seen.add(nx); q.push([nx, d + 1]); } }
  return 99;
}

function combatEV(att, def) {
  const aS = applyStatus(att.slots, att.status), dS = applyStatus(def.slots, def.status);
  const aFroz = att.status.includes('frozen'), dFroz = def.status.includes('frozen');
  let ev = 0;
  for (let i = 0; i < 16; i++) for (let j = 0; j < 16; j++) {
    const r = resolve(aFroz ? {k:'red'} : aS[i], dFroz ? {k:'red'} : dS[j]);
    if (r.defKO) ev += 1; if (r.attKO) ev -= 1;
    if (r.statusOnDef) ev += 0.25; if (r.statusOnAtt) ev -= 0.25;
  }
  return ev / 256;
}

function aiUsePlate() {
  if (state.plateUsed || !state.plates[AI].length) return;
  const myPlates = state.plates[AI];
  const threat = Object.values(state.units).find(u => u.owner === 'p1' && u.node && distTo(u.node, 'G2') <= 2);
  if (threat) {
    const idx = myPlates.findIndex(k => PLATES[k].target === 'enemy' && !threat.status.includes(PLATES[k].status));
    if (idx >= 0) { usePlate(AI, idx, threat.uid); return; }
  }
  const hurt = Object.values(state.units).find(u => u.owner === AI && u.node && u.status.some(s => !['wait','bulwark'].includes(s)));
  if (hurt) { const idx = myPlates.indexOf('cleanse'); if (idx >= 0) { usePlate(AI, idx, hurt.uid); return; } }
}

function rushThreat() {
  // Snelste speler-unit richting G2, in beurten
  let best = null;
  for (const u of Object.values(state.units)) {
    if (u.owner !== 'p1' || !u.node || u.status.includes('sleep')) continue;
    const mp = Math.min(3, UNIT_DEFS[u.defKey].mp);
    const d = distTo(u.node, 'G2');
    const turns = Math.ceil(d / mp);
    if (!best || turns < best.turns || (turns === best.turns && d < best.d)) best = { uid: u.uid, turns, d };
  }
  return best;
}

const G2_ADJ = ['T2','T3','IT2'];
const GOAL_ZONE = ['G2','T2','T3','IT2'];

function aiTurn() {
  if (state.over || state.turn !== AI || state.mode !== 'solo' || state.locked) return; state.aiThinking = true; renderAll();
  setTimeout(() => {
    state.aiThinking = false; if (state.over) return;
    aiUsePlate();
    const threat = rushThreat();
    const danger = threat && threat.turns <= 3;
    const zoneUnits = Object.values(state.units).filter(u => u.owner === AI && u.node && GOAL_ZONE.includes(u.node));
    const lastDefender = zoneUnits.length === 1 ? zoneUnits[0].uid : null;
    const zoneEmpty = zoneUnits.length === 0;
    const onBoard = Object.values(state.units).filter(u => u.owner === AI && u.node).length;
    const actions = [];

    const posScore = (t, dNow) => {
      let s = (dNow - distTo(t, 'G1')) * 25;
      if (NODES[t].type === 'goal' && NODES[t].owner === 'p1') s = 1000;
      if (GOAL_ZONE.includes(t)) {
        if (zoneEmpty && onBoard >= 1) s += danger ? 400 : 150; // zone altijd hermannen, niet alleen bij paniek
        if (t === 'G2') s += 60;
      }
      return s;
    };

    for (const uid of state.bench[AI]) {
      const u = state.units[uid]; if (u.status.includes('wait')) continue;
      for (const t of deployTargets(u)) {
        let s = 25 + Math.max(0, 4 - onBoard) * 15 + posScore(t, distTo(t, 'G1') + 2) * 0.6;
        actions.push({ type:'deploy', uid, target:t, score: s + Math.random() * 5 });
      }
    }
    for (const u of Object.values(state.units)) {
      if (u.owner !== AI || !u.node || u.status.includes('sleep')) continue;
      const dNow = distTo(u.node, 'G1');
      const inZone = GOAL_ZONE.includes(u.node);
      for (const t of legalMoves(u)) {
        const occ = unitAt(t);
        if (occ && occ.owner !== AI) {
          let s = combatEV(u, occ) * 120 + 10;
          if (threat && occ.uid === threat.uid && threat.turns <= 2) s += 120;
          if (u.uid === lastDefender && !(threat && occ.uid === threat.uid)) s -= 300; // laatste verdediger jaagt niet
          actions.push({ type:'attack', uid:u.uid, target:t, defenderUid:occ.uid, score: s + Math.random() * 5 });
        } else {
          let s = posScore(t, dNow);
          if (u.uid === lastDefender && !GOAL_ZONE.includes(t)) s -= 500;       // laatste verdediger blijft ALTIJD
          else if (inZone && danger && !GOAL_ZONE.includes(t)) s -= 150;        // bij dreiging blijft iedereen liever
          actions.push({ type:'move', uid:u.uid, target:t, score: s + Math.random() * 5 });
        }
      }
    }
    if (actions.length === 0) { renderAll(); setTimeout(endTurn, 300); return; }
    actions.sort((a, b) => b.score - a.score); const best = actions[0];
    if (best.type === 'deploy') { state.locked = true; doDeploy(state.units[best.uid], best.target).then(() => { state.actionsLeft--; state.locked = false; afterAction(); }); }
    else if (best.type === 'move') { state.locked = true; moveUnit(state.units[best.uid], best.target).then(()=>{ const g = NODES[best.target]; if (g.type==='goal' && g.owner !== AI) { endMatch(AI, 'AI BEREIKT JE DOEL!'); return; } state.actionsLeft--; state.locked = false; afterAction(); }); }
    else if (best.type === 'attack') { 
        state.locked = true; const u = state.units[best.uid]; const path = bfs(u.node, best.target);
        if (path && path.length > 1) {
            const standNode = path[path.length - 2];
            if (standNode !== u.node) { moveUnit(u, standNode).then(() => { state.actionsLeft--; runCombat(u, state.units[best.defenderUid]); }); }
            else { state.actionsLeft--; runCombat(u, state.units[best.defenderUid]); }
        } else { state.locked = false; setTimeout(endTurn, 300); }
    }
  }, 800);
}
